<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="utf-8" />
   <meta name="viewport" content="width=device-width,initial-scale=1" />
   <title>Tic Tac Toe — Modern</title>
   <link rel="stylesheet" href="style.css" />
   <meta name="description" content="Modern Tic Tac Toe with player names, scores, undo, and animations" />
</head>

<body>
   <div class="app">
      <header class="app-header">
         <h1 class="title">Tic Tac Toe</h1>
         <div class="controls">
            <button id="newGameBtn" class="btn">New Game</button>
            <button id="undoBtn" class="btn">Undo</button>
            <button id="resetScoresBtn" class="btn secondary">Reset Scores</button>
         </div>
      </header>

      <main class="main">
         <section class="board-area">
            <div class="board" id="board" role="grid" aria-label="Tic Tac Toe board">
               <button class="cell" data-index="0" aria-label="cell 1" role="gridcell"></button>
               <button class="cell" data-index="1" aria-label="cell 2" role="gridcell"></button>
               <button class="cell" data-index="2" aria-label="cell 3" role="gridcell"></button>
               <button class="cell" data-index="3" aria-label="cell 4" role="gridcell"></button>
               <button class="cell" data-index="4" aria-label="cell 5" role="gridcell"></button>
               <button class="cell" data-index="5" aria-label="cell 6" role="gridcell"></button>
               <button class="cell" data-index="6" aria-label="cell 7" role="gridcell"></button>
               <button class="cell" data-index="7" aria-label="cell 8" role="gridcell"></button>
               <button class="cell" data-index="8" aria-label="cell 9" role="gridcell"></button>
            </div>
         </section>

         <aside class="panel stats-panel">
            <div class="players">
               <div class="player" id="playerX">
                  <div class="mark">X</div>
                  <div class="meta">
                     <div class="name" id="nameX">Player 1</div>
                     <div class="score">Wins: <span id="scoreX">0</span></div>
                  </div>
               </div>
               <div class="player" id="playerO">
                  <div class="mark">O</div>
                  <div class="meta">
                     <div class="name" id="nameO">Player 2</div>
                     <div class="score">Wins: <span id="scoreO">0</span></div>
                  </div>
               </div>
            </div>
            <div class="status" id="status">Enter player names to start</div>
            <div class="match-stats">
               <div class="score">Draws: <span id="scoreDraw">0</span></div>
            </div>
         </aside>
      </main>

      <footer class="app-footer">
         <small>Modern Tic Tac Toe — built with ❤️</small>
         <div class="footer-links">
            <a href="https://www.linkedin.com/in/shaniprajapatiii/" target="_blank" rel="noreferrer">LinkedIn</a>
            <a href="https://github.com/shaniprajapatiii" target="_blank" rel="noreferrer">GitHub</a>
         </div>
      </footer>
   </div>

   <!-- Player name modal -->
   <div class="modal" id="nameModal" aria-hidden="true">
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
         <h2 id="modalTitle">Enter Player Names</h2>
         <form id="namesForm">
            <label>
               Player X
               <input type="text" id="inputX" placeholder="Player X" maxlength="20" />
            </label>
            <label>
               Player O
               <input type="text" id="inputO" placeholder="Player O" maxlength="20" />
            </label>
            <div class="modal-actions">
               <button type="submit" class="btn primary">Start Game</button>
               <button type="button" id="skipNames" class="btn tertiary">Use Defaults</button>
            </div>
         </form>
      </div>
   </div>

   <script src="script.js"></script>
</body>

</html>
